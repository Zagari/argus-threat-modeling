name: CI/CD

# Roda em PRs para a main (feedback antes de mergear) e em pushes na main.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend (ruff · mypy · pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      # Libs nativas do WeasyPrint (necessárias p/ o teste de geração de PDF).
      - name: Instalar libs nativas (cairo/pango)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0 libcairo2

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Type check (mypy)
        run: mypy app

      - name: Testes (pytest, modo mock)
        env:
          ARGUS_LLM_MOCK: "1"
        run: pytest

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Build
        run: npm run build

  training:
    name: Dataset sintético (gerador · testes)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: training/requirements.txt

      - name: Instalar data-tooling (sem torch)
        run: |
          python -m pip install --upgrade pip
          pip install -r training/requirements.txt ruff

      - name: Lint (ruff)
        run: ruff check training --exclude '*.ipynb'

      - name: Sanidade do gerador (formato YOLO)
        run: python training/synthetic/generate_synthetic.py --n 20 --out /tmp/ds --imgsz 640

      - name: Testes do dataset (pytest)
        run: pytest training/tests -q

  build-push:
    name: Build & push imagens (GHCR)
    needs: [backend, frontend]            # só roda se os testes passarem
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write                     # necessário p/ publicar no GHCR
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - name: Login no GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # token automático do Actions

      - name: Build & push backend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/Dockerfile.backend
          # produção roda o ARGUS completo (detector + OCR + pipeline)
          build-args: |
            INSTALL_ML=true
          push: true
          tags: |
            ghcr.io/zagari/argus-backend:latest
            ghcr.io/zagari/argus-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/Dockerfile.frontend
          push: true
          tags: |
            ghcr.io/zagari/argus-frontend:latest
            ghcr.io/zagari/argus-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy (self-hosted)
    needs: build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, argus]   # roda no runner dentro da VPN/servidor — sem SSH
    concurrency:
      group: argus-deploy           # evita dois deploys simultâneos
      cancel-in-progress: false
    steps:
      - name: Atualizar e subir os containers
        run: |
          set -e
          cd ~/argus
          git pull --ff-only
          docker compose -f docker-compose.prod.yml pull
          docker compose -f docker-compose.prod.yml up -d
          docker image prune -f
