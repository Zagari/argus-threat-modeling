# ─────────────────────────────────────────────────────────────────────────────
# ARGUS — Taxonomia agnóstica de nuvem (fonte de verdade da Fase 1)
#
# Cada `classe_canonica` (a chave) carrega:
#   dfd_type   : tipo DFD primário (Process | DataStore | ExternalEntity | TrustBoundary)
#   stride     : categorias STRIDE aplicáveis (nomes completos Microsoft/Shostack)
#   aws        : palavras-chave que aparecem nos NOMES dos ícones oficiais AWS
#   azure      : idem para os ícones oficiais Azure
#   gcp        : idem para os ícones oficiais Google Cloud (cloud.google.com/icons)
#   labels     : sinônimos de RÓTULO-TEXTO (caminho por OCR — cobre genérico/whiteboard)
#   cpe_hints  : pistas de CPE (vendor:product) para a busca de CVE na Fase 3/5
#
# Dois usos distintos dos sinônimos:
#   (a) aws/azure/gcp -> usados por icons/fetch_icons.py para indexar cada SVG oficial
#                        na sua classe canônica (alimenta o detector visual, E1).
#   (b) labels        -> usados pelo caminho OCR (E2) p/ classificar por texto quando o
#                        glifo é desconhecido (qualquer nuvem por nome).
#
# A ORDEM das classes abaixo define o índice da classe no YOLO (0..N-1).
# Mantida em sincronia com backend/app/taxonomy.py (CANONICAL_ELEMENT_TYPE).
# Só o E1 (visão) é acoplado à nuvem; E2–E6 operam só sobre as classes canônicas.
# ─────────────────────────────────────────────────────────────────────────────
version: 1

classes:

  actor_user:
    dfd_type: ExternalEntity
