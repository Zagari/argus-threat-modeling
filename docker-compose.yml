# ARGUS & Cíclope — orquestração local.
# LITE (padrão, só Cíclope):   docker compose up --build
# FULL (ARGUS, detector+OCR):  ARGUS_ML=true GEMINI_API_KEY=... \
#                              ARGUS_DETECTOR_HF=zagari/argus-detector docker compose up --build
# Neo4j (Graph-RAG, Fase 3):   docker compose --profile full up
# Ver README → "Modos de implantação".

services:
  backend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.backend
      args:
        INSTALL_ML: "${ARGUS_ML:-false}"   # true = imagem com detector/OCR (ARGUS)
    ports:
      - "8000:8000"
    environment:
      ARGUS_CORS_ORIGINS: "http://localhost:8080"
      ARGUS_LLM_PROVIDER: "${ARGUS_LLM_PROVIDER:-gemini}"
      ARGUS_LLM_MODEL: "${ARGUS_LLM_MODEL:-gemini/gemini-2.5-flash}"
      ARGUS_LLM_MOCK: "${ARGUS_LLM_MOCK:-0}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      # Pipeline ARGUS (só têm efeito se ARGUS_ML=true):
      ARGUS_DETECTOR_HF: "${ARGUS_DETECTOR_HF:-}"
      ARGUS_OCR_GPU: "${ARGUS_OCR_GPU:-0}"
      ARGUS_CROSSCHECK: "${ARGUS_CROSSCHECK:-1}"
      # RAG semântico (3.7) — opt-in (precisa de ARGUS_ML=true p/ as deps); índice/modelo no volume
      ARGUS_RAG: "${ARGUS_RAG:-0}"
      ARGUS_EMBED_MODEL: "${ARGUS_EMBED_MODEL:-paraphrase-multilingual-MiniLM-L12-v2}"
      ARGUS_CHROMA_DIR: /data/chroma
      HF_HOME: /data/hf
    volumes:
      - rag_data:/data

  frontend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

  # Banco de grafo do Graph-RAG — só entra na Fase 3 (profile "full").
  neo4j:
    image: neo4j:5
    profiles: ["full"]
    environment:
      NEO4J_AUTH: "neo4j/arguspass"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

volumes:
  neo4j_data:
  rag_data:    # índice Chroma + cache de modelos do RAG (3.7)
