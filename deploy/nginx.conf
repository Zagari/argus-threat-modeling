server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA — rotas do React caem no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy das chamadas de API para o backend (serviço compose "backend").
    # `capabilities` habilita a aba ARGUS; `analyze/stream` é SSE (o backend manda
    # X-Accel-Buffering: no, que o nginx respeita p/ não bufferizar os eventos).
    location ~ ^/(analyze|settings|report|health|stage|capabilities) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 25m;
        # Análise com LLM de visão pode passar de 60s (default); damos folga.
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}
